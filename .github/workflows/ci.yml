name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall chronicle_keeper

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Run mypy
        run: python -m mypy

      - name: Run unit tests
        run: python -m pytest -q tests/test_config.py tests/test_processor.py tests/test_clients.py

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Repository hygiene check (artifacts/env/large files)
        run: python scripts/check_repo_hygiene.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run integration test (stub Whisper + stub LLM)
        run: python -m pytest -q tests/test_integration_pipeline.py
