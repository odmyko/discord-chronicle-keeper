x-bot-common: &bot-common
  build:
    context: .
    dockerfile: Dockerfile
  image: discord-chronicle-keeper:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    DATA_DIR: /app/data
  volumes:
    - ./data:/app/data

services:
  bot:
    <<: *bot-common
    environment:
      DATA_DIR: /app/data
      LLM_BASE_URL: ${LLM_BASE_URL:-http://127.0.0.1:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-local-model}

  bot_docker_llm:
    <<: *bot-common
    profiles: ["docker-llm"]
    models:
      llm:
        endpoint_var: LLM_BASE_URL
        model_var: LLM_MODEL

models:
  llm:
    model: ai/gpt-oss:20B-MXFP4
    context_size: 131072
